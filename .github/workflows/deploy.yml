name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    # CI check removed temporarily (Actions minutes exhausted)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.SERVER_HOST }}" ] && missing="$missing SERVER_HOST"
          [ -z "${{ secrets.SERVER_USER }}" ] && missing="$missing SERVER_USER"
          [ -z "${{ secrets.SERVER_SSH_KEY }}" ] && missing="$missing SERVER_SSH_KEY"
          [ -z "${{ secrets.GHCR_TOKEN }}" ] && missing="$missing GHCR_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - uses: actions/checkout@v5

      # ── Lowercase repo name (GHCR requires it) ────────────────────────────
      - name: Set image names
        id: vars
        run: |
          REPO="${{ github.repository }}"
          REPO_LC="${REPO,,}"
          echo "backend_image=ghcr.io/${REPO_LC}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${REPO_LC}/frontend" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"

      # ── Login to GitHub Container Registry ──────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push backend image ─────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.vars.outputs.backend_image }}:latest
            ${{ steps.vars.outputs.backend_image }}:${{ github.sha }}

      # ── Build & push frontend image (prod multi-stage) ─────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.frontend_image }}:latest
            ${{ steps.vars.outputs.frontend_image }}:${{ github.sha }}

      # ── Deploy to server via SSH ───────────────────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_REPO
          script: |
            set -e
            APP_DIR="/opt/seodirect"
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            # Pull latest compose and config files from repo
            if [ ! -d .git ]; then
              git clone --depth 1 https://${GITHUB_ACTOR}:${GHCR_TOKEN}@github.com/${GITHUB_REPO}.git .tmp_repo
              cp .tmp_repo/docker-compose.prod.yml .
              cp -r .tmp_repo/nginx .
              cp -r .tmp_repo/scripts .
              rm -rf .tmp_repo
            else
              git fetch origin main --depth 1
              git checkout origin/main -- docker-compose.prod.yml nginx/ scripts/
            fi

            # Login to GHCR on server
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Run deploy
            bash scripts/deploy.sh
